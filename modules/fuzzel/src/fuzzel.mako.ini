[main]
dpi-aware=no
font=${font_sans}:size=${font_size_medium}
% if DEPLOY_DISTRO == 'arch':
use-bold=yes
% endif
width=72
icons-enabled=no
horizontal-pad=0
vertical-pad=2
inner-pad=0
prompt=" 箚뜆  "
minimal-lines=yes
lines=20
line-height=24

[colors]
background=${color_named('primary_1', 1.0)}
border=${color_named('primary_8', 1.0)}
prompt=${color_named('text_15', 1.0)}
placeholder=${color_named('text_6', 1.0)}
input=${color_named('system_text', 1.0)}
selection=${color_named('menu_selection_bg', 1.0)}
text=${color_named('system_text', 1.0)}
match=${color_named('menu_match_fg', 1.0)}
selection-text=${color_named('menu_selection_fg', 1.0)}
selection-match=${color_named('menu_match_fg', 1.0)}

[border]
width=3
radius=0
