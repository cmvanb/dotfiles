<% source $XDG_OPT_HOME/theme/theme.sh -%>
[main]
dpi-aware=no
font=<%= $font_sans %>:size=<%= $font_size_medium %>
<% if [[ $DEPLOY_DISTRO == "arch" ]]; then -%>
use-bold=yes
<% fi -%>
width=72
icons-enabled=no
horizontal-pad=0
vertical-pad=2
inner-pad=0
prompt=" 󰍉  "
minimal-lines=yes
lines=20
line-height=24

[colors]
background=<% color_named $primary_1 %>ff
border=<% color_named $primary_8 %>ff
prompt=<% color_named $text_15 %>ff
placeholder=<% color_named $text_6 %>ff
input=<% color_named $system_text %>ff
selection=<% color_named $menu_selection_bg %>ff
text=<% color_named $system_text %>ff
match=<% color_named $menu_match_fg %>ff
selection-text=<% color_named $menu_selection_fg %>ff
selection-match=<% color_named $menu_match_fg %>ff

[border]
width=3
radius=0
