# Workspace-to-output assignments (auto-generated)
<%
    order_file = XDG_CONFIG_HOME + '/sway/output-order'
    named_workspaces = ['11:home', '12:mail', '13:todo', '14:audio', '15:auth', '16:system', '17:config', '18:editor', '19:project', '20:ssh']
    with open(order_file) as _f:
        outputs = [l.strip() for l in _f if l.strip() and not l.strip().startswith('#')]
%>
% for slot, output in enumerate(outputs):
<%  offset = slot * 10 %>
    % for i in range(1, 11):
workspace ${offset + i} output ${output}
    % endfor
    % if slot == 0:
        % for ws in named_workspaces:
workspace ${ws} output ${output}
        % endfor
    % endif
% endfor
