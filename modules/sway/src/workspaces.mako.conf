# Workspace-to-output assignments (auto-generated)
<%
    order_file = XDG_CONFIG_HOME + '/sway/output-order'
    named_workspaces = ['11:home', '12:mail', '13:todo', '14:vim', '15:auth', '16:system', '17:config', '18:dev', '19:project', '20:ssh', '21:chat', '22:audio']
    # Named workspaces land on the primary output (slot 0) unless overridden per host.
    slot_overrides = {'cyxwel': {'22:audio': 1, '21:chat': 1}}.get(DEPLOY_HOST, {})
    with open(order_file) as _f:
        outputs = [
            l.strip()
            for l in _f
            if l.strip() and not l.strip().startswith('#')
        ]
%>
% for slot, output in enumerate(outputs):
<%  offset = slot * 10 %>
    % for i in range(1, 11):
workspace ${offset + i} output ${output}
    % endfor
    % for ws in named_workspaces:
        % if min(slot_overrides.get(ws, 0), len(outputs) - 1) == slot:
workspace ${ws} output ${output}
        % endif
    % endfor
% endfor
