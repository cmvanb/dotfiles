#-------------------------------------------------------------------------------
# Hyprlock configuration
#-------------------------------------------------------------------------------

background {
    monitor =
    path = screenshot
    color = ${color_css_rgba('system_bg', 1.0)}

    blur_passes = 3
    blur_size = 5
    noise = 0.025
}

label {
    text = ${USER}⋅${DEPLOY_HOST}
    color = ${color_css_rgba('system_text', 1.0)}
    font_size = 16
    font_family = Liberation Sans

    position = 0, 32
    halign = center
    valign = center
}

input-field {
    position = 0, -20
    size = 240, 40
    halign = center
    valign = center

    font_family = Liberation Sans
    font_color = ${color_css_rgba('system_text', 1.0)}
    placeholder_text = <span font_size='12pt'><i>Enter password...</i></span>

    outline_thickness = 2
    rounding = 4

    # TODO: Implement this color function in theme API.
    inner_color = rgba(${color_named('system_bg', 1.0)})
    outer_color = rgba(${color_named('primary_12', 1.0)})
    check_color = rgba(${color_named('green_6', 1.0)})
    fail_color = rgba(${color_named('red_5', 1.0)})

    fade_on_empty = false
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = easeInQuart, 0.5, 0, 0.75, 0

    animation = fadeIn, 1, 10.8, linear
    animation = fadeOut, 1, 1.8, linear
    animation = inputField, 1, 1, easeInQuart
}
